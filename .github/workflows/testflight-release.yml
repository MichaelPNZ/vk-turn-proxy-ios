name: TestFlight Release

on:
  push:
    tags:
      - "v*build*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload"
        required: true
        default: "v1.0-build162"
      target:
        description: "Apple targets to upload"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ios
          - macos

permissions:
  contents: write

jobs:
  upload-testflight:
    name: Upload iOS/macOS to TestFlight
    runs-on: macos-latest
    timeout-minutes: 120

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANDROID_HOME: /Users/runner/Library/Android/sdk
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CI_ANDROID_STORE_PASSWORD: ci-android-store-password
      CI_ANDROID_KEY_PASSWORD: ci-android-store-password
      CI_ANDROID_KEY_ALIAS: vk-turn-proxy-ci

    steps:
      - name: Select release inputs
        id: select
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME:-}" =~ build[0-9]+$ ]]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="${{ github.event.inputs.tag }}"
          fi
          target="${{ github.event.inputs.target || 'all' }}"
          echo "TAG=$tag" >> "$GITHUB_ENV"
          echo "TARGET_SET=$target" >> "$GITHUB_ENV"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "Using TAG=$tag TARGET_SET=$target"

      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.select.outputs.tag }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            WireGuardBridge/go.sum

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install build tooling
        shell: bash
        run: |
          set -euo pipefail
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Create ephemeral CI Android signing key
        shell: bash
        run: |
          set -euo pipefail
          keytool -genkeypair \
            -keystore androidApp/ci-release.jks \
            -storepass "$CI_ANDROID_STORE_PASSWORD" \
            -keypass "$CI_ANDROID_KEY_PASSWORD" \
            -alias "$CI_ANDROID_KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=VK Turn Proxy CI,O=VK Turn Proxy,C=US"
          {
            printf 'storeFile=ci-release.jks\n'
            printf 'storePassword=%s\n' "$CI_ANDROID_STORE_PASSWORD"
            printf 'keyAlias=%s\n' "$CI_ANDROID_KEY_ALIAS"
            printf 'keyPassword=%s\n' "$CI_ANDROID_KEY_PASSWORD"
          } > androidApp/signing.properties

      - name: Install Apple signing assets
        shell: bash
        env:
          APPLE_DISTRIBUTION_CERT_P12_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERT_P12_BASE64 }}
          APPLE_DISTRIBUTION_CERT_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERT_PASSWORD }}
          APPLE_PROVISIONING_PROFILES_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILES_BASE64 }}
          APPSTORE_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APPSTORE_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APPSTORE_CONNECT_API_KEY_P8_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_P8_BASE64 }}
        run: scripts/install-apple-signing-assets.sh

      - name: Preflight TestFlight signing
        shell: bash
        run: scripts/preflight-testflight.sh "$TAG"

      - name: Upload to TestFlight and GitHub Release
        shell: bash
        run: ./release.sh "$TAG" "$TARGET_SET"
