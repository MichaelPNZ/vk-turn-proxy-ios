name: Release Gates

on:
  push:
    branches:
      - main
    tags:
      - "v*build*"
  pull_request:
  workflow_dispatch:

jobs:
  non-apple-and-release-gates:
    name: Non-Apple Artifacts + Release Gates
    runs-on: macos-latest
    timeout-minutes: 90

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANDROID_HOME: /Users/runner/Library/Android/sdk
      CI_ANDROID_STORE_PASSWORD: ci-android-store-password
      CI_ANDROID_KEY_PASSWORD: ci-android-store-password
      CI_ANDROID_KEY_ALIAS: vk-turn-proxy-ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select release tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" && "${GITHUB_REF_NAME:-}" =~ build[0-9]+$ ]]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="v1.0-build166"
          fi
          echo "TAG=$tag" >> "$GITHUB_ENV"
          echo "Using TAG=$tag"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            WireGuardBridge/go.sum

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Apple build tooling
        shell: bash
        run: |
          set -euo pipefail
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Create ephemeral CI Android signing key
        shell: bash
        run: |
          set -euo pipefail
          keytool -genkeypair \
            -keystore androidApp/ci-release.jks \
            -storepass "$CI_ANDROID_STORE_PASSWORD" \
            -keypass "$CI_ANDROID_KEY_PASSWORD" \
            -alias "$CI_ANDROID_KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=VK Turn Proxy CI,O=VK Turn Proxy,C=US"
          {
            printf 'storeFile=ci-release.jks\n'
            printf 'storePassword=%s\n' "$CI_ANDROID_STORE_PASSWORD"
            printf 'keyAlias=%s\n' "$CI_ANDROID_KEY_ALIAS"
            printf 'keyPassword=%s\n' "$CI_ANDROID_KEY_PASSWORD"
          } > androidApp/signing.properties
          keytool -list \
            -keystore androidApp/ci-release.jks \
            -storepass "$CI_ANDROID_STORE_PASSWORD" \
            -alias "$CI_ANDROID_KEY_ALIAS" >/dev/null

      - name: Shell and manifest tests
        shell: bash
        run: |
          set -euo pipefail
          for script in release.sh scripts/*.sh; do
            bash -n "$script"
          done
          scripts/test-release-manifest-format.sh
          scripts/test-release-tag-alignment.sh
          scripts/test-server-deploy-safety.sh
          scripts/test-server-public-smoke-evidence-contract.sh
          scripts/test-android-physical-evidence-contract.sh
          scripts/test-windows-runtime-evidence-contract.sh
          scripts/test-windows-runtime-package-ci-smoke-contract.sh
          scripts/test-windows-installer-evidence-contract.sh
          scripts/test-apple-signing-evidence-contract.sh
          scripts/test-github-testflight-secrets-config-contract.sh
          scripts/test-apple-smoke-evidence-contract.sh
          scripts/test-server-production-evidence-contract.sh
          TAG="$TAG" scripts/test-external-smoke-kit.sh
          scripts/test-windows-installer-packaging.sh

      - name: Go tests
        shell: bash
        run: go test ./...

      - name: Gradle non-Apple builds
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew \
            :shared:allTests \
            :androidApp:assembleDebug \
            :androidApp:assembleRelease \
            :androidApp:bundleRelease \
            :desktopApp:build

      - name: Package release artifacts
        shell: bash
        run: scripts/package-release-artifacts.sh "$TAG"

      - name: Build unsigned Apple Release targets
        shell: bash
        run: scripts/build-apple-release-local.sh all

      - name: Prepare external smoke kit
        shell: bash
        run: scripts/prepare-external-smoke-kit.sh "$TAG"

      - name: Final readiness with external blockers as warnings
        shell: bash
        run: ALLOW_EXTERNAL_BLOCKERS=1 scripts/final-release-readiness.sh "$TAG"

      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vk-turn-proxy-${{ env.TAG }}-ci-artifacts
          if-no-files-found: error
          path: |
            androidApp/build/outputs/apk/release/androidApp-release.apk
            androidApp/build/outputs/bundle/release/androidApp-release.aab
            build/windows-package/vk-turn-proxy-windows-runtime.zip
            build/server/vk-turn-proxy-server-${{ env.TAG }}-linux-amd64.tar.gz
            build/release/${{ env.TAG }}-cross-platform-sha256.txt
            build/external-smoke-kit/${{ env.TAG }}/

  windows-runtime-package-smoke:
    name: Windows Runtime Package Smoke
    runs-on: windows-latest
    timeout-minutes: 45

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ANDROID_HOME: C:\Users\runneradmin\AppData\Local\Android\Sdk

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.sum
            WireGuardBridge/go.sum

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -euo pipefail
          android_home_unix="$(cygpath -u "$ANDROID_HOME" 2>/dev/null || printf '%s' "$ANDROID_HOME")"
          sdkmanager_bin="$(find "$android_home_unix/cmdline-tools" -path '*/bin/sdkmanager*' -type f | sort | tail -1)"
          if [[ -z "$sdkmanager_bin" ]]; then
            echo "sdkmanager not found under $ANDROID_HOME" >&2
            exit 1
          fi
          yes | "$sdkmanager_bin" --licenses >/dev/null || true
          "$sdkmanager_bin" "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Build Windows runtime package
        shell: bash
        run: scripts/package-windows-runtime.sh

      - name: Smoke Windows runtime package
        shell: pwsh
        run: scripts/smoke-windows-runtime-package-ci.ps1

      - name: Upload Windows package smoke evidence
        uses: actions/upload-artifact@v4
        with:
          name: vk-turn-proxy-windows-package-smoke-${{ github.run_id }}
          if-no-files-found: error
          path: build/evidence/windows-runtime-package-ci-smoke/
